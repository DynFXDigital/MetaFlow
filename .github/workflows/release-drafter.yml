name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, unlabeled, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-release-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Draft release notes
        uses: release-drafter/release-drafter@3a7fb5c85b80b1dda66e1ccb94009adbbd32fce3 # v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
