name: Traceability Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  traceability:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run traceability validator (warn-only)
        run: python scripts/traceability/validate_traceability.py
