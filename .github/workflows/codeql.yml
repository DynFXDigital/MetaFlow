name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "20 4 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: GHAS workflow gate
        run: |
          if [ "${{ vars.ENABLE_GHAS_WORKFLOWS }}" = "true" ]; then
            echo "GHAS workflows enabled; running CodeQL analysis."
          else
            echo "GHAS workflows disabled; skipping CodeQL analysis."
          fi

      - name: Checkout
        if: ${{ vars.ENABLE_GHAS_WORKFLOWS == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        if: ${{ vars.ENABLE_GHAS_WORKFLOWS == 'true' }}
        uses: github/codeql-action/init@60d8f0d1f1f8c8d07ef53bd027032705d414ec28 # v3
        with:
          languages: ${{ matrix.language }}

      - name: Setup Node.js
        if: ${{ vars.ENABLE_GHAS_WORKFLOWS == 'true' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ vars.ENABLE_GHAS_WORKFLOWS == 'true' }}
        run: npm ci

      - name: Build workspace
        if: ${{ vars.ENABLE_GHAS_WORKFLOWS == 'true' }}
        run: npm run build

      - name: Perform CodeQL Analysis
        if: ${{ vars.ENABLE_GHAS_WORKFLOWS == 'true' }}
        uses: github/codeql-action/analyze@60d8f0d1f1f8c8d07ef53bd027032705d414ec28 # v3
