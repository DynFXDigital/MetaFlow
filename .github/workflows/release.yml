name: Release Extension

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release (tag or SHA)
        required: true
        default: main

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref_name || inputs.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Package and create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve release ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF_INPUT="${{ inputs.ref }}"
          else
            REF_INPUT="${{ github.ref }}"
          fi

          if [[ "$REF_INPUT" == refs/tags/v* ]]; then
            REF_NAME="${REF_INPUT#refs/tags/}"
            RELEASE_TAG="$REF_NAME"
          elif [[ "$REF_INPUT" == v* ]]; then
            REF_NAME="$REF_INPUT"
            RELEASE_TAG="$REF_NAME"
          else
            echo "Unsupported ref '$REF_INPUT'. Allowed: refs/tags/v* or v*."
            exit 1
          fi

          if [[ "$RELEASE_TAG" =~ -alpha|-beta|-rc|-preview ]]; then
            IS_PRERELEASE="true"
          else
            IS_PRERELEASE="false"
          fi

          echo "ref_to_build=$REF_INPUT" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref_to_build }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspace
        run: npm run build

      - name: Package extension
        working-directory: src
        run: npm run package

      - name: Resolve VSIX path
        id: vsix
        shell: bash
        run: |
          VSIX_PATH="$(find src -maxdepth 1 -type f -name '*.vsix' | head -1)"
          if [ -z "$VSIX_PATH" ]; then
            echo "No VSIX found under src/."
            exit 1
          fi
          VSIX_NAME="$(basename "$VSIX_PATH")"
          echo "VSIX_PATH=$VSIX_PATH" >> "$GITHUB_ENV"
          echo "vsix_path=$VSIX_PATH" >> "$GITHUB_OUTPUT"
          echo "vsix_name=$VSIX_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vsix.outputs.vsix_name }}
          path: ${{ steps.vsix.outputs.vsix_path }}
          retention-days: 30

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [ "${{ steps.ref.outputs.is_prerelease }}" = "true" ]; then
            EXTRA_ARGS="--prerelease"
          fi

          if gh release view "${{ steps.ref.outputs.release_tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.ref.outputs.release_tag }}" "$VSIX_PATH" --clobber
          else
            gh release create "${{ steps.ref.outputs.release_tag }}" \
              "$VSIX_PATH" \
              --verify-tag \
              --title "${{ steps.ref.outputs.release_tag }}" \
              --generate-notes \
              $EXTRA_ARGS
          fi
